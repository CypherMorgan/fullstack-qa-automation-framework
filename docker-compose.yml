version: "3.9"

services:

  selenium:
    image: selenium/standalone-chrome:4.21.0
    container_name: selenium

    shm_size: 2gb

    ports:
      - "4444:4444"

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4444/wd/hub/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mock-server:
    build:
      context: ./mock_server
      dockerfile: Dockerfile

    container_name: mock-server

    ports:
      - "8000:8000"

  tests:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: automation-tests

    depends_on:
      selenium:
        condition: service_healthy

      mock-server:
        condition: service_started

    environment:
      - PYTHONPATH=/app

    volumes:
      - ./allure-results:/app/allure-results
      - ./reports:/app/reports
      - ./screenshots:/app/screenshots
      - ./logs:/app/logs

    command: >
      pytest tests
      --env=dev
      --alluredir=allure-results
      --html=reports/report.html
      --self-contained-html